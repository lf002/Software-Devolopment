{% extends 'fastpass/base.html' %}
{% block title %}Guest Login{% endblock %}
{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2>🎫 FastPass Login</h2>
    <p>Enter your email to view and book FastPasses.</p>
    {% if messages %}
    {% for message in messages %}
    <div style="padding: 15px; margin: 15px 0; border-radius: 5px;
        background: {% if message.tags == 'error' %}#dc3545{% elif message.tags == 'success' %}#28a745{% else %}#17a2b8{% endif %};">
        {{ message }}
    </div>
    {% endfor %}
    {% endif %}
    <form method="post" style="margin-top: 20px;">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            <label for="id_email" style="display: block; margin-bottom: 5px;">
                Email Address
            </label>
            {{ form.email }}
        </div>
        <button type="submit" style="
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        ">Find My Account</button>
    </form>
</div>
<style>
.form-input {
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 1em;
}
</style>
{% endblock %}
